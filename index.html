<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>
    <style>
        @import url('https://googleapis.com');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: #191919; /* Sfondo richiesto */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 10px;
            background: #191919;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 4vw, 30px);
            width: 100%;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 0;
        }

        .number {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 600;
            color: #e63946; /* Rosso Natale per i numeri */
            line-height: 1;
        }

        .label {
            font-size: clamp(0.65rem, 2.2vw, 0.8rem);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            color: #ffffff; /* Scritte Bianche */
            white-space: nowrap;
        }

        .expired {
            font-size: 2rem;
            font-weight: 600;
            color: #ffffff;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Solo il Countdown -->
        <div class="countdown" id="timer">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Giorni</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Ore</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Minuti</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Secondi</span>
            </div>
        </div>
    </div>

    <script>
        // Scadenza fissa: 23 Dicembre 2026 alle ore 01:00:00
        const targetDate = new Date('December 23, 2026 01:00:00').getTime();

        const countdownInterval = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                clearInterval(countdownInterval);
                document.getElementById('timer').innerHTML = "<div class='expired'>✨ Tempo Scaduto! ✨</div>";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
        }, 1000);
    </script>

</body>
</html>
