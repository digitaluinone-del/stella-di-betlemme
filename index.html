<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Candy Cane con Neve Arcobaleno</title>
    <style>
        @import url('https://googleapis.com');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: #191919; /* Sfondo Grigio Scuro */
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 10px;
            background: #191919;
            position: relative;
            z-index: 2; /* Mantiene i numeri sopra la neve */
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 4vw, 30px);
            width: 100%;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 0;
            position: relative;
        }

        /* --- EFFETTO STRISCE VERTICALI CANDY CANE --- */
        .number {
            font-size: clamp(2.2rem, 8vw, 3.8rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(
                to right,
                #e63946 0%,
                #e63946 50%,
                #ffffff 50%,
                #ffffff 100%
            );
            background-size: 14px 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.5));
        }

        .label {
            font-size: clamp(0.65rem, 2.2vw, 0.8rem);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 10px;
            color: #ffffff;
            white-space: nowrap;
            font-weight: 700;
        }

        /* --- ANIMAZIONE NEVE DAL BASSO VERSO L'ALTO --- */
        .snowflake {
            position: absolute;
            bottom: -20px;
            font-size: 1em;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% {
                bottom: -20px;
                transform: translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8; /* Maggiore opacità per far risaltare i colori */
            }
            90% {
                opacity: 0.8;
            }
            100% {
                bottom: 105vh;
                transform: translateX(60px) rotate(360deg);
                opacity: 0;
            }
        }

        .expired {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Contenitore della neve dinamica -->
    <div id="snow-container"></div>

    <div class="container">
        <div class="countdown" id="timer">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Giorni</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Ore</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Minuti</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Secondi</span>
            </div>
        </div>
    </div>

    <script>
        const targetDate = new Date('December 23, 2026 01:00:00').getTime();

        const countdownInterval = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                clearInterval(countdownInterval);
                document.getElementById('timer').innerHTML = "<div class='expired'>✨ Tempo Scaduto! ✨</div>";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
        }, 1000);

        // GENERATORE DI FIOCCHI IN RISALITA CON COLORI ARCOBALENO
        function createSnowflake() {
            const snowContainer = document.getElementById('snow-container');
            if (!snowContainer) return;

            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            
            const snowTypes = ['❄', '❅', '❆', '•'];
            snowflake.innerText = snowTypes[Math.floor(Math.random() * snowTypes.length)];
            
            // Array con i colori dell'arcobaleno
            const rainbowColors = [
                '#ff3333', // Rosso
                '#ff9933', // Arancione
                '#ffff33', // Giallo
                '#33cc33', // Verde
                '#3399ff', // Azzurro
                '#3333ff', // Blu
                '#9933ff'  // Viola
            ];
            
            // Assegna un colore casuale dall'array ad ogni fiocco
            snowflake.style.color = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
            
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = Math.random() * 4 + 3 + 's';
            snowflake.style.fontSize = Math.random() * 8 + 12 + 'px'; // Leggermente più grandi per vedere meglio i colori

            snowContainer.appendChild(snowflake);

            setTimeout(() => {
                snowflake.remove();
            }, 7000);
        }

        setInterval(createSnowflake, 150); // Generazione leggermente più frequente
    </script>

</body>
</html>
